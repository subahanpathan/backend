services:
  - type: web
    name: bug-tracker-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
      - key: SUPABASE_KEY
      - key: SUPABASE_SERVICE_KEY
      - key: JWT_SECRET
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        value: https://frontend123-mq5rwwwmv-subahanpathans-projects.vercel.app
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: UPLOAD_DIR
        value: /tmp/uploads/
