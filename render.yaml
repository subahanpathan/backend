services:
  - type: web
    name: bug-tracker-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SUPABASE_URL
        scope: build
        sync: false
      - key: SUPABASE_KEY
        scope: build
        sync: false
      - key: SUPABASE_SERVICE_KEY
        scope: build
        sync: false
      - key: JWT_SECRET
        scope: build
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        value: https://your-frontend-url.vercel.app
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: UPLOAD_DIR
        value: /tmp/uploads/
